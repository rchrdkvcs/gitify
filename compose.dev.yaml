services:
  database:
    image: postgres:alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d app"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm dev:api
    ports:
      - "3333:3333"
    env_file:
      - ./apps/api/.env
    environment:
      HOST: 0.0.0.0
      DB_HOST: database
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
    depends_on:
      database:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: pnpm dev:web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/apps/web/node_modules
    depends_on:
      - api

volumes:
  db_data:
